m1:
  description: >
    M1 scheme
  type: schema

  bc_kind:
    type: keyword
    allowed: ["outgoing", "none"]
    default: "outgoing"
    description: >
      Boundary conditions

  id_type:
    type: keyword
    allowed: ["straight_beam", "scattering", "shadow", "emitting_sphere", "zero", "curved_beam"]
    default: "zero"
    description: >
      Initialization prescription for radiation fields

  atmosphere:
    type: schema
    description: >
      Atmosphere settings for M1

    E_fl:
      type: double
      range: "(0,*)"
      default: 1.e-14
      description: >
        Floor of energy density

    E_scaling:
      type: double
      range: "[0,*)"
      default: 0
      description: >
        Radial dependence of energy density floor

    eps_fl:
      type: double
      default: 1
      range: "(0,*)"
      description: >
        Flooring value for average energy

    eps_min:
      type: double
      default: 1
      range: "(0,*)"
      description: >
        Minimum allowed average energy

    eps_max:
      type: double
      default: 1
      range: "(0,*)"
      description: >
        Maximum allowed average energy

    eps_scaling:
      type: double
      default: 0
      range: "[0,*)"
      description: >
        Value to scale eps floor with r^x

  excision:
    type: schema
    description: >
      Excision parameters for M1 transport

    E_excision:
      type: double
      default: 1.e-14
      range: "(0,*)"
      description: >
        Value of energy density inside excised regions

    eps_excision:
      type: double
      default: 1
      range: "(0,*)"
      description: >
        Value of average energy inside excised regions

  eas:
    type: schema
    description: >
      Parameters controlling emission absorption and scattering rates

    kind:
      type: keyword
      allowed: ["test", "photon_rates", "neutrino_analytic", "neutrino_weakhub", "bns_nurates"]
      default: "test"
      description: >
        EAS provider (single).  Ignored when 'kinds' is non-empty.

    kinds:
      type: list
      item_type: string
      default: []
      description: >
        EAS providers to run, in order (composable form).  Same values as
        'kind'.  Combining photon_rates with a neutrino provider requires
        a build with -DGRACE_M1_PHOTONS=ON.  Empty list falls back to the
        scalar 'kind'.

    use_analytic:
      type: bool
      default: true
      description: >
        Deprecated — no longer read by the code. The EAS provider is selected
        exclusively via 'kind' / 'kinds'. This parameter is kept only for
        backwards compatibility with old parameter files and has no effect.

    beta_decay:
      type: bool
      default: true
      description: >
        Include charged-current (beta-decay) reactions in the analytic neutrino
        rates: p + e- <-> n + nue and n + e+ <-> p + anti-nue.  These are the
        dominant source of nue/anti-nue emission and absorption near the
        neutrinosphere.  Analytic rate path only; the weakhub table always
        includes beta processes.

    plasmon_decay:
      type: bool
      default: true
      description: >
        Include plasmon decay (gamma* -> nu + anti-nu) emission.  Contributes
        to all species at high density.  Applied in both the analytic and
        weakhub paths (added on top of the table opacities in the latter).

    bremsstrahlung:
      type: bool
      default: true
      description: >
        Include nucleon-nucleon bremsstrahlung (NN -> NN + nu + anti-nu)
        emission.  Dominant nux emission channel at low temperatures.  Applied
        in both the analytic and weakhub paths (added on top of the table
        opacities in the latter).

    pair_annihilation:
      type: bool
      default: true
      description: >
        Include electron-positron pair annihilation (e+ + e- -> nu + anti-nu)
        emission.  Contributes to all species at high temperatures.  Applied in
        both the analytic and weakhub paths (added on top of the table opacities
        in the latter).

    betaeq_policy:
      type: keyword
      allowed: ["off", "chemical", "timescale", "gieg"]
      default: "off"
      description: >
        Per-cell beta-equilibrium policy applied before evaluating the rates.
        off: Ye is used as-is from the evolved state (default).
        chemical: Ye is reset to the chemical beta-equilibrium value
        (mu_e + mu_p = mu_n + Qnp) at the local (rho, T) before computing
        rates — appropriate for optically thick regions.
        timescale: (T, Ye, Ymu) relaxed jointly toward radiation-matter
        equilibrium using a SINGLE global timescale (min over all species).
        gieg: per-flavor TWO-timescale equilibration (Gieg+ 2026, Table 3) —
        electron and muon sectors classified independently (tau_e, tau_mu) and
        equilibrated only where their own neutrinos are (partially) trapped;
        a free-streaming flavor is left to the rates (5-species only).
        CAVEAT: 'gieg' relaxes matter and radiation to (partial) EQUILIBRIUM
        states and does NOT capture non-equilibrium neutrino distribution
        effects (gray, LTE-equilibrium approximation); the partially-trapped /
        transition regime is approximate.  It also decides trapping from the
        local equilibration timescale, so it is REDUNDANT with (and the
        tau-driven degeneracy rescaling is inconsistent with) an eikonal
        optical depth — set tau_policy='none' when using 'gieg'.  Both
        conditions emit a runtime warning at M1 setup.

    temperature_correction:
      type: bool
      default: true
      description: >
        Apply a spectral temperature correction to the neutrino opacities and
        emission rates (FIL parity).  The effective neutrino temperature T_nu
        is derived from the radiation field's fluid-frame mean energy via the
        Fermi-Dirac ratio FD(2)/FD(3), and all rates are rescaled by
        (T_nu / T_fluid)^2 when T_nu > T_fluid.  For nue and nuebar this
        scales Q, R, kappa_a, kappa_n and kappa_s; for nux only kappa_s is
        corrected; muon species are not corrected (the weakhub table already
        carries the spectral information).  When no radiation is present
        (eps_rad = 0, e.g. at it=0 or in the atmosphere) the correction is
        inert (factor = 1).

    tau_outer_radius_code:
      type: double
      range: "[0,*)"
      default: 0
      description: >
        Outer radius [code units] of the optical-depth path estimate.
        Required (> 0) by tau_policy local_spherical and local_kappa.

    tau_policy:
      type: keyword
      allowed: ["analytic_density","local_spherical","local_kappa","eikonal","none"]
      default: "none"
      description: >
        Optical depth used to suppress the neutrino fugacities
        (eta_nu -> eta_nu * (1 - exp(-tau))).
        none: thin limit everywhere.
        analytic_density: Deaton+ 2013 density fit — COLD NS only, known
        to fail for hot matter.
        local_spherical: kappa * (r_outer - r) seeded by the cold fit.
        local_kappa: per-species (kappa_a + kappa_s) * (r_outer - r) using
        the previous step's opacities (recommended; thin at t=0, builds up
        within one step).

    weakhub_table:
      type: string
      default: ""
      description: >
        Absolute path to the Weakhub HDF5 opacity table.  Required when
        kind/kinds includes 'neutrino_weakhub'.  The table provides grey
        absorption and scattering opacities as functions of density, temperature,
        Ye, and Ymu for up to 6 neutrino species.



  scattering_test:
    type: schema
    description: >
      Parameters of scattering test

    k_s:
      type: double
      default: 100
      range: "(0,*)"
      description: >
        Constant scattering opacity

    t_0:
      type: double
      default: 1
      range: "(0,*)"
      description: >
        Time of initial data

    is_static_background:
      type: bool
      default: true
      description: >
        Is background fluid static or moving?

  emitting_sphere_test:
    type: schema
    description: >
      Parameters for emitting sphere test

    temperature:
      type: double
      default: 1
      range: "(0,*)"
      description: >
        Temperature for rates

    cross_section:
      type: double
      default: 10
      range: "(0,*)"
      description: >
        Cross section for rates

  backreaction:
    type: schema
    description: >
      Parameters controlling the coupling of the radiation field back to the
      fluid (energy and momentum source terms in the GRMHD equations).

    enabled:
      type: bool
      default: true
      description: >
        Enable radiation-matter backreaction.  When false, the fluid evolves
        without any M1 source terms (useful for testing transport in a frozen
        background).

    t_start:
      type: double
      default: -1
      range: "[-1,*)"
      description: >
        Simulation time at which backreaction is activated.  Negative value
        (default -1) means active from the start.  Useful to let the radiation
        field build up before coupling it to the fluid.
