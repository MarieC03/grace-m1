eos:
  type: schema
  description: >
    EOS parameters

  eos_type:
    type: keyword
    default: "hybrid"
    allowed: ["ideal_gas", "hybrid", "tabulated", "leptonic"]
    description: >
      Kind of EOS

  ideal_gas_eos:
    type: schema
    description: >
      Parameters for the ideal gas eos
    gamma:
      type: double
      default: 2
      range: "(1,*)"
      description: >
        Adiabatic index
    entropy_min:
      type: double
      default: 1e-12
      range: "(0,*)"
      description: >
        Lower bound on entropy to avoid log(0)
    kappa_id:
      type: double
      default: 0
      range: "[0,*)"
      description: >
        If the initial data is a polytrope, kappa of that polytrope in geom units

  hybrid_eos:
    type: schema
    description: >
      Parameters for the hybrid eos

    cold_eos_type:
      type: keyword
      default: "piecewise_polytrope"
      allowed: ["piecewise_polytrope", "tabulated"]
      description: >
        For hybrid_eos: kind of cold eos

    gamma_th:
      type: double
      default: 1.8
      range: "(*,*)"
      description: >
        Thermal Gamma for hybrid eos

    cold_table_filename:
      type: string
      default: "cold.grace"
      description: >
        Path to the GRACE cold EOS table (v2 format), used when
        cold_eos_type == "tabulated".  Ignored otherwise.

  piecewise_polytrope:
    type: schema
    description: >
      Piecewise polytrope parameters

    n_pieces:
      type: unsigned int
      default: 7
      range: "[1,*)"
      description: >
        Number of pieces

    gammas:
      type: list
      item_type: double
      range: "(0,*)"
      default: [1.58425 , 1.28733     , 0.62223     , 1.35692     , 3.005       , 2.988       , 2.851]
      description: >
        Gammas of piecewise polytrope

    rhos:
      type: list
      item_type: double
      range: "(0,*)"
      default: [ 3.951156e-11, 6.125960e-07, 4.254672e-06, 2.367449e-04, 8.114721e-04, 1.619100e-03]
      description: >
        rhos of piecewise polytrope

    kappa_0:
      type: double
      default: 1.685819e+02
      range: "[0,*)"
      description: >
        Kappa of first piece

  tabulated_eos:
    type: schema
    description: >
      Parameters for nuclear tabulated eos
    table_filename:
      type: string
      default: "blah.h5"
      description: >
        File name of tabulated eos
    table_format:
      type: keyword
      allowed: ["compose", "stellarcollapse"]
      default: "compose"
      description: >
        Format of 3D table
    cold_table_filename:
      type: string
      default: "blah.grace"
      description: >
        Cold slice table file name
    baryon_mass:
      type: keyword
      allowed: ["m_u", "m_n"]
      default: "m_u"
      description: >
        Baryonic mass convention for the nb <-> rho conversion on the cold
        EOS table. "m_u" (atomic mass unit, default) matches FUKA / LORENE /
        Margherita. "m_n" (neutron mass) is strict CompOSE. Must match the
        convention used when the cold table was generated. Note: the choice
        also controls the eps redefinition applied to CompOSE tables on read.
    sanitize_axes:
      type: bool
      default: true
      description: >
        If true (default), regenerate the interior points of the log(nb),
        log(T), and Y_e axes uniformly between their stored endpoints after
        ingest. This removes FP32->FP64 quantization jitter from tables that
        were written with single-precision axes, which would otherwise make
        the axis spacing non-uniform at the bit level and bias the table's
        (uniform-spacing) index-lookup arithmetic. Requires the axis to be
        uniform in its canonical transform space (log for nb and T, linear
        for Y_e) -- this matches the CompOSE convention. A warning is
        emitted if the original spacing deviates from uniform by more than
        a small relative tolerance.

  eps_maximum:
    type: double
    default: 1.e5
    range: "(0,*)"
    description: >
      Maximum allowed specific internal energy

  entropy_minimum:
    type: double
    default: 1e-13
    range: "(0,*)"
    description: >
      Minimum allowed entropy per particle
