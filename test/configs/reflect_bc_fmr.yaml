# Config for the reflection-BC unit test on an FMR layout.  Octant domain
# [0,1]^3 with reflection symmetries on all three axes, plus one level of
# fixed-mesh refinement on a box that includes the origin.  This exercises
# the reflection BC kernel on cells at multiple AMR levels and at the
# coarse-fine interface adjacent to the reflection plane.
#
# Reflection at the physical boundary remains a bit-exact index-mirror
# copy regardless of AMR level (the FP arithmetic in BCs is on HIGH-side
# faces only — which the test skips), so the same exe runs with tol=0.

name: "grace"

amr: {
  npoints_block_x: 8,
  npoints_block_y: 8,
  npoints_block_z: 8,

  xmin: 0.0,
  xmax: 1.0,
  ymin: 0.0,
  ymax: 1.0,
  zmin: 0.0,
  zmax: 1.0,

  reflection_symmetries: { x: true, y: true, z: true },

  n_ghostzones: 4,
  initial_refinement_level: 0,
  max_refinement_level: 2,
  regrid_every: -1,
  regrid_at_postinitial: false,

  n_fmr_boxes: 1,
  fmr_boxes: [
    {
      target_level_delta: 1,
      x_min: 0.0, x_max: 0.5,
      y_min: 0.0, y_max: 0.5,
      z_min: 0.0, z_max: 0.5
    }
  ]
}

IO: {
  info_output_every: 1
}

system: {
  console_log_level: "info",
  n_device_streams: 1
}

checkpoints: {
  checkpoint_at_termination: false
}
