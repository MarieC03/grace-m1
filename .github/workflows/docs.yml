name: Build and Deploy Docs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Force JS-based actions onto Node 24 immediately.  Node 20 is deprecated
# (forced switch June 2026, full removal September 2026); opting in now
# keeps us off the deprecation warning and avoids a future scramble.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz cmake
          python3 -m pip install --upgrade pip
          pip install -r doc/requirements.txt || true

      - name: Build docs
        run: |
          cmake -Bbuild-docs -DGRACE_BUILD_DOCS=ON -DGRACE_BUILD_DOCS_ONLY=ON
          cmake --build build-docs

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build-docs/doc

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
