# Unmagnetized shocktube (setup A in GRACE paper)
# Npoints along x is 32 x 2 (ref level) x 20 (stacked trees) = 1280 
name: "balsara2"
amr: {
  # Points per quadrant
  npoints_block_x: 32,
  npoints_block_y: 32,
  npoints_block_z: 32,
  # Grid extents 
  xmin: -0.5,
  xmax: 0.5,
  ymin: -0.025,
  ymax: 0.025,
  zmin: -0.025,
  zmax: 0.025,
  # Uniform grid level
  initial_refinement_level: 1,
  # Don't touch this 
  n_ghostzones: 4
}

IO: {
  # 2D out 
  plane_surface_output_cell_variables: ["hydro"],
  plane_surface_output_every: 100,
  do_initial_output: true,

  # console out 
  info_output_every: 2,
  info_output_max_reductions: ["rho", "press"],
  info_output_min_reductions: ["rho", "press"],

  # scalar out 
  scalar_output_every: 50,
  scalar_output_minmax: ["rho","press","eps"],

  # hdf5 settings 
  output_use_hdf5: true, 
  hdf5_compression_level: 0, # needed on viper, does not support compression
  hdf5_chunk_size: 128
}

system: {
  # minimal output 
  console_log_level: "info",
  file_log_level: "info",
  # no need to change this
  n_device_streams: 4
}

evolution: {
  time_stepper: "rk3",
  cfl_factor: 0.25,
  final_time: 0.45
}

grmhd: {
  id_type: "shocktube",
  
  shocktube: {
    rho_L: 10.,
    rho_R: 1.,
    press_L: 13.33,
    press_R: 6.6e-7
  },

  # This means B is zero
  B_field_initialization: "none"
}

eos: {
  eos_type: "ideal_gas",

  ideal_gas_eos: {
    gamma: 1.6666667
  }
}